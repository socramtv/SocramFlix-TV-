<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocramFlix+ Pro</title>
    <!-- Hls.js para reproducir streaming m3u8 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- Pako para descargar guías .gz -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #121212;
            color: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Contenedor del Reproductor Premium Estilo Netflix */
        #player-section {
            background: #000;
            width: 100%;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
        }
        .video-container {
            width: 100%;
            max-width: 1000px;
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Capa de controles flotantes sobre el vídeo */
        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 60%, rgba(0,0,0,0) 100%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 20px 15px 10px 15px;
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .video-container:hover .custom-controls,
        .video-container.paused .custom-controls {
            opacity: 1;
            pointer-events: auto;
        }
        
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }
        .controls-left, .controls-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, color 0.2s;
        }
        .control-btn:hover {
            color: #4CAF50;
            transform: scale(1.1);
        }
        
        /* Línea de tiempo interactiva */
        .timeline-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .time-display {
            font-size: 0.85rem;
            font-family: monospace;
            color: #ccc;
        }
        input[type="range"] {
            -webkit-appearance: none;
            flex: 1;
            background: rgba(255,255,255,0.2);
            height: 4px;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            transition: height 0.1s;
        }
        input[type="range"]:hover {
            height: 6px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            background: #4CAF50;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }
        
        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .volume-container input[type="range"] {
            width: 70px;
        }

        .live-badge {
            background: #e74c3c;
            color: #fff;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            display: none;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .btn-cast {
            color: #3498db;
            font-weight: bold;
            border: 1px solid #3498db;
            border-radius: 4px;
            padding: 3px 8px;
            font-size: 0.8rem;
        }
        .btn-cast:hover { background: #3498db; color: #fff; }

        /* Selector de Apartado Principal (TV vs Pelis) */
        .navigation-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px auto 5px auto;
            max-width: 1000px;
            width: 90%;
        }
        .tab-button {
            flex: 1;
            background: #1e1e1e;
            color: #aaa;
            border: 1px solid #2d2d2d;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-button.active {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        /* Resto de la Interfaz */
        #content-section {
            padding: 0 20px 20px 20px;
            max-width: 1000px;
            margin: 0 auto;
            width: -webkit-fill-available;
            width: -moz-available;
        }

        .panel {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #2d2d2d;
        }
        .panel h3 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 1rem;
            color: #4CAF50;
        }

        .input-block {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #2a2a2a;
        }
        .input-block:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }

        .input-row { display: flex; gap: 10px; margin-top: 5px; }
        input[type="text"] {
            flex: 1;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #45a049; }
        
        .btn-alt { background: #008CBA; }
        .btn-alt:hover { background: #007B9A; }
        .btn-vlc { background: #e67e22; }
        .btn-vlc:hover { background: #d35400; }

        input[type="file"] {
            background: #2a2a2a;
            color: #fff;
            padding: 5px;
            border-radius: 6px;
            border: 1px solid #444;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            margin-top: 5px;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            background: #1e1e1e;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #2d2d2d;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
            min-width: 200px;
        }
        select {
            background: #2a2a2a;
            color: #fff;
            padding: 9px 12px;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .search-input-style {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            padding: 9px 12px;
            border-radius: 6px;
            font-size: 0.95rem;
        }

        #epg-status-list { font-size: 0.8rem; color: #aaa; margin: 5px 0 0 0; padding-left: 20px; }
        .now-playing { font-weight: bold; color: #4CAF50; margin-bottom: 8px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Rejilla de Canales */
        #channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }
        .channel-card {
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .channel-card:hover { background: #2a2a2a; border-color: #444; }
        .channel-card img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            background: #fff;
            border-radius: 6px;
            padding: 2px;
        }
        .channel-card span { font-size: 0.85rem; font-weight: 500; }
        
        #player-error-box { display: none; background: #c0392b; color: #fff; padding: 12px; width: 100%; max-width: 1000px; box-sizing: border-box; font-size: 0.9rem; }
        #alt-actions { display: none; margin-top: 8px; gap: 10px; justify-content: center; }

        /* Ficha TMDB */
        .movie-flex-container { display: flex; gap: 20px; margin-top: 5px; align-items: flex-start; }
        .movie-poster { width: 115px; min-width: 115px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.6); border: 1px solid #444; }
        .movie-text-details h4 { margin: 0 0 6px 0; color: #fff; font-size: 1.3rem; }
        .movie-text-details .movie-year { color: #4CAF50; font-size: 0.95rem; margin-bottom: 8px; font-weight: bold; }
        .movie-text-details p { margin: 0; font-size: 0.95rem; color: #d2d2d2; line-height: 1.5; }
    </style>
</head>
<body>

    <!-- Sección del Video y Controles Flotantes Inteligentes -->
    <div id="player-section">
        <div class="video-container paused" id="video-wrapper" onclick="handleVideoClick(event)">
            <video id="video" x-webkit-airplay="allow" preload="auto"></video>
            
            <!-- Capa Única de Controles Estilo Cine -->
            <div class="custom-controls" id="custom-controls-layer">
                <div class="timeline-container" id="timeline-wrapper">
                    <span class="time-display" id="time-current">00:00</span>
                    <input type="range" id="seek-bar" value="0" min="0" step="0.1" oninput="seekVideo()" onclick="event.stopPropagation()">
                    <span class="time-display" id="time-duration">00:00</span>
                </div>

                <div class="controls-row">
                    <div class="controls-left">
                        <button class="control-btn" id="play-pause-btn" onclick="togglePlay(event)">▶</button>
                        <div class="volume-container" onclick="event.stopPropagation()">
                            <button class="control-btn" id="mute-btn" onclick="toggleMute(event)">🔊</button>
                            <input type="range" id="volume-bar" value="1" min="0" max="1" step="0.05" oninput="changeVolume()">
                        </div>
                        <div class="live-badge" id="live-indicator">● EN DIRECTO</div>
                    </div>
                    <div class="controls-right">
                        <button class="control-btn btn-cast" id="cast-btn" onclick="sendToTV(event)" title="Enviar a Smart TV">📺 Enviar TV</button>
                        <button class="control-btn" onclick="toggleFullscreen(event)">🔲</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mensajes de Error -->
    <div style="display:flex; justify-content:center;">
        <div id="player-error-box">
            <div id="error-text"></div>
            <div id="alt-actions">
                <button class="btn-vlc" id="vlc-btn">🧡 Abrir en VLC</button>
                <button class="btn-alt" id="copy-btn">📋 Copiar Enlace</button>
            </div>
        </div>
    </div>

    <!-- Menú de Selección de Apartado Principal -->
    <div class="navigation-tabs">
        <button id="tab-tv" class="tab-button active" onclick="changeSection('tv')">📺 Televisión en Directo</button>
        <button id="tab-movies" class="tab-button" onclick="changeSection('movies')">🍿 Películas y Sagas Propias</button>
    </div>

    <!-- Contenido Principal -->
    <div id="content-section">
        
        <!-- Panel de Administración de Listas de TV (Solo visible en Modo TV) -->
        <div class="panel" id="panel-tv-config">
            <h3>Administrar Listas e IPTV Pública</h3>
            <div class="input-block">
                <label><strong>Cargar desde enlace remoto (URL)</strong></label>
                <div class="input-row">
                    <input type="text" id="m3u-url-input" placeholder="Pegar enlace M3U aquí..." value="https://www.tdtchannels.com/lists/tv.m3u">
                    <button onclick="loadM3UFromUrl()">Cargar</button>
                </div>
            </div>
            <div class="input-block">
                <label for="m3u-file-input"><strong>Subir archivo .m3u manual</strong></label>
                <input type="file" id="m3u-file-input" accept=".m3u,.m3u8" onchange="loadM3UFromFile(event)">
            </div>
            <div style="margin-top: 10px;">
                <strong style="font-size:0.85rem;">Guías EPG Activas:</strong>
                <ul id="epg-status-list"></ul>
            </div>
        </div>

        <!-- Info de Contenido / Ficha TMDB -->
        <div id="epg-container" class="panel">
            <div class="now-playing">🍿 Información en Pantalla</div>
            <div id="epg-info">Selecciona cualquier canal o película de abajo para comenzar.</div>
        </div>

        <!-- Barra Unificada de Filtrado y Buscador -->
        <div class="filter-bar">
            <!-- Selector dinámico de categoría interna del M3U -->
            <div class="filter-item" id="category-filter-wrapper">
                <label for="category-select"><strong id="category-label-text">Filtrar por Categoría:</strong></label>
                <select id="category-select">
                    <option value="">Esperando lista...</option>
                </select>
            </div>

            <!-- Selector EXCLUSIVO de tus Sagas de GitHub (Solo visible en modo Películas) -->
            <div class="filter-item" id="saga-select-wrapper" style="display: none;">
                <label for="saga-select"><strong>Seleccionar Colección / Saga:</strong></label>
                <select id="saga-select" onchange="loadLocalSaga()">
                    <!-- Se rellena con tus 13 archivos automáticamente -->
                </select>
            </div>

            <div class="filter-item">
                <label for="search-input"><strong>Buscador Instantáneo:</strong></label>
                <input type="text" id="search-input" class="search-input-style" placeholder="Escribe para buscar..." oninput="applyFilters()">
            </div>
        </div>

        <!-- Rejilla de canales / películas -->
        <div id="channel-grid"></div>
    </div>

    <script>
        const REPO_SAGAS = [
            { name: "Colección Pixar", file: "Coleccion Pixar.m3u" },
            { name: "Colección DreamWorks Animation", file: "Coleccion DreamWorks Animation.m3u" },
            { name: "Universo DC", file: "Universo DC.m3u" },
            { name: "Universo Marvel", file: "Universo Marvel.m3u" },
            { name: "Sagas Policíacas", file: "Sagas Policiacas.m3u" },
            { name: "Sagas Acción", file: "Sagas Accion.m3u" },
            { name: "Colección Disney", file: "Coleccion Disney.m3u" },
            { name: "Nos va la marcha (Musicales)", file: "Nos va la marcha(Musicales).m3u" },
            { name: "Sagas Suspense", file: "Sagas Suspense.m3u" },
            { name: "Sagas Artes Marciales por Actor", file: "Sagas_Artes_Marciales_por_actor.m3u" },
            { name: "Sagas Comedia", file: "Sagas Comedia.m3u" },
            { name: "Colección Illumination", file: "Coleccion Illumination.m3u" },
            { name: "Colección Blue Sky", file: "Coleccion Blue Sky.m3u" }
        ];

        const EPG_URLS = [
            'https://www.tdtchannels.com/epg/TV.xml.gz',
            'https://epgshare01.online/epgshare01/epg_ripper_ES1.xml.gz'
        ];

        const TMDB_API_KEY = '8057a54a57714cade319b15e4fc0c3b4';

        const video = document.getElementById('video');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const seekBar = document.getElementById('seek-bar');
        const volumeBar = document.getElementById('volume-bar');
        const muteBtn = document.getElementById('mute-btn');
        const timeCurrent = document.getElementById('time-current');
        const timeDuration = document.getElementById('time-duration');
        const videoWrapper = document.getElementById('video-wrapper');
        const timelineWrapper = document.getElementById('timeline-wrapper');
        const liveIndicator = document.getElementById('live-indicator');

        const channelGrid = document.getElementById('channel-grid');
        const categorySelect = document.getElementById('category-select');
        const searchInput = document.getElementById('search-input');
        const epgInfoElement = document.getElementById('epg-info');
        const epgStatusList = document.getElementById('epg-status-list');
        const m3uUrlInput = document.getElementById('m3u-url-input');
        
        const errorBox = document.getElementById('player-error-box');
        const errorText = document.getElementById('error-text');
        const altActions = document.getElementById('alt-actions');
        const vlcBtn = document.getElementById('vlc-btn');
        const copyBtn = document.getElementById('copy-btn');

        const panelTvConfig = document.getElementById('panel-tv-config');
        const sagaSelectWrapper = document.getElementById('saga-select-wrapper');
        const sagaSelect = document.getElementById('saga-select');
        const categoryLabelText = document.getElementById('category-label-text');

        let currentSection = 'tv'; 
        let channels = [];
        let epgDocs = [];
        let hlsInstance = null;
        let currentMediaUrl = "";

        async function init() {
            buildSagaDropdown();
            await loadAllEPGs();
            loadM3UFromUrl(); 
            setupPlayerErrorHandling();
            setupPlayerListeners();
        }

        // CORRECCIÓN: Limpieza profunda al cambiar de pestaña
        function changeSection(section) {
            currentSection = section;
            document.getElementById('tab-tv').classList.toggle('active', section === 'tv');
            document.getElementById('tab-movies').classList.toggle('active', section === 'movies');
            
            // 1. Resetear el cuadro de búsqueda interna
            searchInput.value = "";
            
            // 2. Detener inmediatamente la reproducción de TV (audio y streaming)
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }
            video.pause();
            video.src = '';
            video.load();
            currentMediaUrl = "";
            
            // 3. Apagar forzadamente los letreros flotantes de la TV ("En Directo", barra, etc)
            timelineWrapper.style.display = "none";
            liveIndicator.style.display = "none";
            errorBox.style.display = "none";
            
            // 4. Resetear la memoria interna y limpiar la pantalla provisionalmente
            channels = [];
            categorySelect.innerHTML = '<option value="">Cargando catálogo...</option>';
            channelGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#aaa;">Cambiando de sección...</div>';
            epgInfoElement.innerText = "Selecciona cualquier contenido de abajo para comenzar.";

            // 5. Mostrar u ocultar controles específicos según sección
            if (section === 'tv') {
                panelTvConfig.style.display = "block";
                sagaSelectWrapper.style.display = "none";
                categoryLabelText.innerText = "Filtrar por Categoría:";
                loadM3UFromUrl();
            } else {
                panelTvConfig.style.display = "none";
                sagaSelectWrapper.style.display = "flex";
                categoryLabelText.innerText = "Sub-Categoría Interna:";
                loadLocalSaga(); 
            }
        }

        function buildSagaDropdown() {
            sagaSelect.innerHTML = '';
            REPO_SAGAS.forEach(saga => {
                const opt = document.createElement('option');
                opt.value = `lista/${saga.file}`; 
                opt.innerText = saga.name;
                sagaSelect.appendChild(opt);
            });
        }

        async function loadLocalSaga() {
            const fileUrl = sagaSelect.value;
            channelGrid.innerHTML = '<div>Abriendo colección de películas...</div>';
            try {
                const response = await fetch(fileUrl);
                if(!response.ok) throw new Error();
                const text = await response.text();
                processM3UText(text);
            } catch (e) {
                channelGrid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; color:#f44336; padding:20px;">
                    <strong>Error al cargar la saga local:</strong> Verifica que la carpeta se llame exactamente <code>lista</code> en GitHub y contenga los archivos .m3u correspondientes.
                </div>`;
            }
        }

        // --- MANEJO DE CONTROLES ---
        function setupPlayerListeners() {
            video.addEventListener('timeupdate', () => {
                if (video.duration && isFinite(video.duration) && video.duration > 0) {
                    timelineWrapper.style.display = "flex";
                    liveIndicator.style.display = "none";
                    seekBar.max = video.duration;
                    seekBar.value = video.currentTime;
                    timeCurrent.innerText = formatTime(video.currentTime);
                    timeDuration.innerText = formatTime(video.duration);
                } else {
                    timelineWrapper.style.display = "none";
                    liveIndicator.style.display = "block";
                }
            });

            video.addEventListener('play', () => { 
                playPauseBtn.innerText = "⏸"; 
                videoWrapper.classList.remove('paused');
            });
            video.addEventListener('pause', () => { 
                playPauseBtn.innerText = "▶"; 
                videoWrapper.classList.add('paused');
            });
        }

        function handleVideoClick(event) {
            if (event.target === video || event.target === videoWrapper) {
                togglePlay(event);
            }
        }

        function togglePlay(e) {
            if(e) e.stopPropagation();
            if (video.paused) { video.play().catch(()=>{}); } 
            else { video.pause(); }
        }

        function seekVideo() {
            if(isFinite(video.duration)) { video.currentTime = seekBar.value; }
        }

        function changeVolume() {
            video.volume = volumeBar.value;
            if (video.volume === 0) { muteBtn.innerText = "❌"; } 
            else if (video.volume < 0.5) { muteBtn.innerText = "🔉"; } 
            else { muteBtn.innerText = "🔊"; }
        }

        function toggleMute(e) {
            if(e) e.stopPropagation();
            if (video.muted) {
                video.muted = false;
                muteBtn.innerText = "🔊";
                volumeBar.value = video.volume;
            } else {
                video.muted = true;
                muteBtn.innerText = "❌";
                volumeBar.value = 0;
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return "00:00";
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            const pad = (num) => String(num).padStart(2, '0');
            return h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
        }

        function toggleFullscreen(e) {
            if(e) e.stopPropagation();
            if (!document.fullscreenElement) { videoWrapper.requestFullscreen().catch(err => {}); } 
            else { document.exitFullscreen(); }
        }

        function sendToTV(e) {
            if(e) e.stopPropagation();
            if (!currentMediaUrl) return alert("Primero selecciona un contenido de la lista.");
            if (video.remote && video.remote.prompt) { video.remote.prompt().catch(()=>{}); } 
            else if (video.webkitShowPlaybackTargetPicker) { video.webkitShowPlaybackTargetPicker(); } 
            else { alert("Tu navegador no soporta Cast nativo. Usa Chrome o Edge."); }
        }

        function setupPlayerErrorHandling() {
            video.onerror = function() {
                if (!video.src && currentMediaUrl === "") return;
                const err = video.error;
                let motivo = "El servidor de streaming rechaza conexiones externas por políticas CORS.";
                if (err) {
                    if (err.code === 3) motivo = "Formato incompatible (.mkv o audio AC3 no soportados nativamente por navegadores).";
                    else if (err.code === 4) motivo = "El enlace ha expirado o el archivo no se encuentra disponible.";
                }
                errorText.innerHTML = `<strong>Aviso del Sistema:</strong> ${motivo}`;
                errorBox.style.display = "block";
                altActions.style.display = "flex";
                vlcBtn.onclick = () => { window.location.href = `vlc://${currentMediaUrl}`; };
                copyBtn.onclick = () => { navigator.clipboard.writeText(currentMediaUrl); alert("¡Enlace copiado!"); };
            };
        }

        // --- INTERFAZ Y PROCESADO M3U ---
        async function loadAllEPGs() {
            epgStatusList.innerHTML = '';
            epgInfoElement.innerText = "Sincronizando fuentes de programación...";
            const promises = EPG_URLS.map(async (url) => {
                const name = url.split('/').pop(); 
                const li = document.createElement('li');
                li.innerText = `⏳ Cargando ${name}...`;
                epgStatusList.appendChild(li);
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error();
                    let xmlText = '';
                    if (url.endsWith('.gz')) {
                        const arrayBuffer = await response.arrayBuffer();
                        xmlText = pako.ungzip(new Uint8Array(arrayBuffer), { to: 'string' });
                    } else { xmlText = await response.text(); }
                    xmlText = xmlText.replace(/&((?![A-Za-z0-9#]+;)|$)/g, "&amp;");
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlText, "application/xml");
                    if(xmlDoc.getElementsByTagName("parsererror").length > 0) throw new Error();
                    epgDocs.push(xmlDoc);
                    li.innerText = `✅ ${name} sincronizado.`;
                    li.style.color = "#4CAF50";
                } catch (e) {
                    li.innerText = `❌ ${name} no disponible.`;
                    li.style.color = "#f44336";
                }
            });
            await Promise.all(promises);
            epgInfoElement.innerText = "Elige un canal o película de la lista.";
        }

        async function loadM3UFromUrl() {
            const url = m3uUrlInput.value.trim();
            if (!url) return alert("Escribe una URL.");
            try {
                const response = await fetch(url);
                const text = await response.text();
                processM3UText(text);
            } catch (e) {
                channelGrid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; color:#f44336;">Error de CORS. Sube el archivo .m3u si estás haciendo pruebas locales.</div>`;
            }
        }

        function loadM3UFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            channelGrid.innerHTML = '<div>Procesando archivo local...</div>';
            const reader = new FileReader();
            reader.onload = function(e) { processM3UText(e.target.result); };
            reader.readAsText(file);
        }

        function processM3UText(text) {
            channels = parseM3U(text);
            buildCategoryMenu();
            applyFilters();
        }

        function parseM3U(m3uText) {
            const lines = m3uText.split('\n');
            const parsedChannels = [];
            let currentChannel = {};

            for (let line of lines) {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentChannel.logo = logoMatch ? logoMatch[1] : '';
                    const epgIdMatch = line.match(/tvg-id="([^"]+)"/);
                    currentChannel.epgId = epgIdMatch ? epgIdMatch[1] : '';
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    currentChannel.category = groupMatch ? groupMatch[1] : 'Otros / Películas';
                    const nameParts = line.split(',');
                    currentChannel.name = nameParts[nameParts.length - 1].trim();
                } else if (line.startsWith('http')) {
                    currentChannel.url = line;
                    parsedChannels.push(currentChannel);
                    currentChannel = {};
                }
            }
            return parsedChannels;
        }

        function buildCategoryMenu() {
            const categories = [...new Set(channels.map(c => c.category))].sort();
            categorySelect.innerHTML = '<option value="">Todos los géneros / categorías</option>';
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.innerText = cat;
                categorySelect.appendChild(option);
            });
            categorySelect.onchange = () => { applyFilters(); };
        }

        function applyFilters() {
            const selectedCategory = categorySelect.value;
            const searchWord = searchInput.value.toLowerCase().trim();

            const filtered = channels.filter(c => {
                const matchCategory = selectedCategory ? c.category === selectedCategory : true;
                const matchSearch = searchWord ? c.name.toLowerCase().includes(searchWord) : true;
                return matchCategory && matchSearch;
            });
            renderGrid(filtered);
        }

        function renderGrid(channelList) {
            channelGrid.innerHTML = '';
            if (channelList.length === 0) {
                channelGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#888; padding: 20px;">No hay contenidos disponibles en este filtro.</div>';
                return;
            }
            channelList.forEach(channel => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `
                    <img src="${channel.logo || 'https://via.placeholder.com/50'}" alt="${channel.name}" onerror="this.src='https://via.placeholder.com/50'">
                    <span>${channel.name}</span>
                `;
                card.onclick = () => playMedia(channel);
                channelGrid.appendChild(card);
            });
        }

        function playMedia(item) {
            errorBox.style.display = "none";
            altActions.style.display = "none";
            currentMediaUrl = item.url;

            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
            video.src = '';
            video.load();

            const urlLower = item.url.toLowerCase();
            const isHLSTV = urlLower.includes('.m3u8') || urlLower.includes('.ts') || urlLower.includes('/live/');
            
            const isDirectVideo = currentSection === 'movies' || 
                                  urlLower.includes('pixeldrain.net') || 
                                  urlLower.includes('.mp4') || 
                                  urlLower.includes('.mkv') || 
                                  !isHLSTV;

            if (isDirectVideo) {
                timelineWrapper.style.display = "flex";
                liveIndicator.style.display = "none";
                video.src = item.url;
                video.load();
                video.play().catch(()=>{});
                searchMovieInTMDB(item.name);
            } else {
                timelineWrapper.style.display = "none";
                liveIndicator.style.display = "block";
                if (Hls.isSupported()) {
                    hlsInstance = new Hls();
                    hlsInstance.loadSource(item.url);
                    hlsInstance.attachMedia(video);
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() { video.play().catch(()=>{}); });
                    hlsInstance.on(Hls.Events.ERROR, function(event, data) {
                        if (data.fatal) { video.src = item.url; video.play().catch(()=>{}); }
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = item.url;
                    video.addEventListener('loadedmetadata', function() { video.play().catch(()=>{}); });
                }
                updateEPGDisplay(item);
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function fetchFromTMDB(query, year = null) {
            try {
                let url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&language=es-ES`;
                if (year) url += `&year=${year}`;
                const res = await fetch(url);
                return res.ok ? await res.json() : null;
            } catch (e) { return null; }
        }

        async function searchMovieInTMDB(rawName) {
            epgInfoElement.innerHTML = "Buscando carátula y detalles en TMDB...";
            const yearMatch = rawName.match(/\b(19\d{2}|20[0-2]\d)\b/);
            const detectedYear = yearMatch ? yearMatch[1] : null;

            let cleanQuery = rawName
                .replace(/\.(mp4|mkv|avi|webm|mov|ts)$/i, '')
                .replace(/[🍿🎬🎥📀▶►👇📢🌟✅🎭📺⭐🎞️🍿🔹🔸🔴]/g, '')
                .replace(/[\(\[\{].*?[\)\]\}]/g, ' ')
                .replace(/\b(1080p|720p|4k|2k|uhd|hd|sd|x264|h264|x265|h265|hevc|bluray|brrip|bdrip|dvdrip|hdrip|hdtv|webrip|webdl|web|rip|dual|audio|ac3|dts|aac|5\.1|vox|cine|esp|lat|castellano|spanish|sub|subs|subtitulado|multi|hdr|microhd|completa|pelicula|peli|full|torrent|descarga)\b/gi, '')
                .replace(/[-_.,|:+\/*_]/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();

            let queriesToTry = [cleanQuery];
            let parts = rawName.split(/[|:-]/);
            if (parts.length > 1) {
                let lastChunk = parts[parts.length - 1].replace(/\.(mp4|mkv|avi)$/i, '').replace(/\s+/g, ' ').trim();
                if (lastChunk && lastChunk !== cleanQuery) queriesToTry.push(lastChunk);
            }

            let data = null;
            for (let currentQuery of queriesToTry) {
                if (detectedYear) {
                    data = await fetchFromTMDB(currentQuery, detectedYear);
                    if (data && data.results && data.results.length > 0) break;
                }
                data = await fetchFromTMDB(currentQuery, null);
                if (data && data.results && data.results.length > 0) break;
            }

            if (data && data.results && data.results.length > 0) {
                const movie = data.results[0];
                const posterUrl = movie.poster_path ? `https://image.tmdb.org/t/p/w200${movie.poster_path}` : 'https://via.placeholder.com/115x170?text=Sin+Imagen';
                const year = movie.release_date ? movie.release_date.split('-')[0] : 'Desconocido';

                epgInfoElement.innerHTML = `
                    <div class="movie-flex-container">
                        <img class="movie-poster" src="${posterUrl}" alt="${movie.title}">
                        <div class="movie-text-details">
                            <h4>${movie.title}</h4>
                            <div class="movie-year">📅 Año: ${year} | 📊 Nota: ${movie.vote_average || 'N/C'}</div>
                            <p>${movie.overview || 'Sin descripción disponible.'}</p>
                        </div>
                    </div>
                `;
            } else {
                epgInfoElement.innerHTML = `<div><strong>Archivo:</strong> ${rawName}</div>`;
            }
        }

        function updateEPGDisplay(channel) {
            if (epgDocs.length === 0) return;
            const channelId = channel.epgId || channel.name;
            const now = new Date();
            let currentProgramTitle = "Programación de TV no disponible para este canal.";

            for (let xmlDoc of epgDocs) {
                const programmes = xmlDoc.querySelectorAll(`programme[channel="${channelId}"]`);
                if (programmes.length > 0) {
                    for (let prog of programmes) {
                        const startAttr = prog.getAttribute('start');
                        const stopAttr = prog.getAttribute('stop');
                        if (startAttr && stopAttr) {
                            const startTime = parseEPGDate(startAttr);
                            const stopTime = parseEPGDate(stopAttr);
                            if (now >= startTime && now <= stopTime) {
                                const titleNode = prog.querySelector('title');
                                const descNode = prog.querySelector('desc');
                                currentProgramTitle = titleNode ? titleNode.textContent : "Sin título";
                                if (descNode) currentProgramTitle += ` - ${descNode.textContent}`;
                                epgInfoElement.innerText = currentProgramTitle;
                                return;
                            }
                        }
                    }
                }
            }
            epgInfoElement.innerText = currentProgramTitle;
        }

        function parseEPGDate(dateStr) {
            return new Date(dateStr.substr(0, 4), dateStr.substr(4, 2) - 1, dateStr.substr(6, 2), dateStr.substr(8, 2), dateStr.substr(10, 2), dateStr.substr(12, 2));
        }

        window.onload = init;
    </script>
