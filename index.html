  <style>
    /* Estilos base de SocramFlix+ */
    body {
      background-color: #111;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
    }

    h2 {
      margin-left: 10px;
    }

    /* Contenedor de subpestañas */
    .sub-tabs-container {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      padding: 0 10px;
    }

    .sub-tab-btn {
      background: #222;
      color: #aaa;
      border: 1px solid #333;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .sub-tab-btn.active {
      background: #e50914; /* Rojo estilo streaming */
      color: #fff;
      border-color: #e50914;
    }

    .sub-tab-btn:hover {
      opacity: 0.9;
    }

    /* Rejilla de Canales */
    .channels-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
      padding: 10px;
    }

    .channel-card {
      background: #1e1e1e;
      border: 1px solid #2d2d2d;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }

    .channel-card:hover {
      transform: translateY(-5px);
      background: #282828;
    }

    .channel-icon-placeholder {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .channel-name {
      font-size: 14px;
      font-weight: bold;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Estilos del Reproductor / Modal */
    .modal-player {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .video-container {
      width: 80%;
      max-width: 800px;
      background: #000;
      position: relative;
    }

    video {
      width: 100%;
      display: block;
    }

    .close-btn {
      position: absolute;
      top: -40px;
      right: 0;
      background: #e50914;
      color: white;
      border: none;
      padding: 8px 16px;
      cursor: pointer;
      font-weight: bold;
      border-radius: 4px;
    }
  </style>
</head>

  <div class="sub-tabs-container">
    <button id="btn-lista-m3u" class="sub-tab-btn active" onclick="cambiarSubSeccionTV('m3u')">Lista M3U</button>
    <button id="btn-lista-dash" class="sub-tab-btn" onclick="cambiarSubSeccionTV('dash')">Canales Premium (DASH)</button>
  </div>

  <!-- Contenedor Rejilla M3U (Tu lista dinámica actual) -->
  <div id="grid-canales-m3u" class="channels-grid">
    <div class="channel-card">
      <div class="channel-icon-placeholder">📺</div>
      <div class="channel-name">Canal Ejemplo M3U</div>
    </div>
    <!-- Aquí se inyectan tus canales actuales desde el parser M3U -->
  </div>

  <!-- Contenedor Rejilla DASH (Nuevos canales fijos) -->
  <div id="grid-canales-dash" class="channels-grid" style="display: none;">
    <!-- Se inyecta dinámicamente mediante JS -->
  </div>

      <button class="close-btn" onclick="cerrarModalReproductor()">CERRAR</button>
      <video id="video" controls autoplay crossorigin="anonymous"></video>

    // Variables globales globales del reproductor
    let player;
    let videoElement;

    // Inicializar Shaka Player al cargar la ventana
    window.addEventListener('DOMContentLoaded', initShakaPlayer);

    function initShakaPlayer() {
      // Instalar polyfills para asegurar compatibilidad entre navegadores
      shaka.polyfil.installAll();

      if (shaka.Player.isBrowserSupported()) {
        videoElement = document.getElementById('video');
        player = new shaka.Player(videoElement);

        // Captura de errores globales de Shaka
        player.addEventListener('error', (event) => {
          console.error('Error de Shaka Player:', event.detail);
        });
      } else {
        console.error('¡Tu navegador no soporta Shaka Player o reproducción DRM!');
      }
    }

    // 2. LOGICA DE INTERFAZ: Cambiar entre subsecciones M3U y DASH
    function cambiarSubSeccionTV(tipo) {
      const gridM3U = document.getElementById('grid-canales-m3u');
      const gridDash = document.getElementById('grid-canales-dash');
      const btnM3U = document.getElementById('btn-lista-m3u');
      const btnDash = document.getElementById('btn-lista-dash');

      if (tipo === 'm3u') {
        gridM3U.style.display = 'grid';
        gridDash.style.display = 'none';
        btnM3U.classList.add('active');
        btnDash.classList.remove('active');
      } else {
        gridM3U.style.display = 'none';
        gridDash.style.display = 'grid';
        btnM3U.classList.remove('active');
        btnDash.classList.add('active');
        
        // Cargar los canales premium la primera vez que se entra
        if (gridDash.children.length === 0) {
          renderizarCanalesDash();
        }
      }
    }

    // 3. RENDERIZADO: Crear las tarjetas de canales Premium
    function renderizarCanalesDash() {
      const container = document.getElementById('grid-canales-dash');
      container.innerHTML = ''; // Limpiar

      canalesDashPremium.forEach(canal => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.innerHTML = `
          <div class="channel-icon-placeholder">🌟</div>
          <div class="channel-name" title="${canal.name}">${canal.name}</div>
        `;
        
        // Evento click para reproducir
        card.addEventListener('click', () => {
          reproducirCanalPremium(canal);
        });
        
        container.appendChild(card);
      });
    }

    // 4. REPRODUCCIÓN: Lógica multiclave ClearKey y carga en Shaka
    function reproducirCanalPremium(canal) {
      abrirModalReproductor();

      // Construcción del objeto ClearKey dinámicamente
      const clearKeysObj = {};
      
      // Separar por comas por si el canal contiene múltiples claves (ej: La 2, Antena 3)
      const kidsArray = canal.kid.split(',');
      const keysArray = canal.key.split(',');

      kidsArray.forEach((kid, index) => {
        if (keysArray[index]) {
          const cleanKid = kid.trim();
          const cleanKey = keysArray[index].trim();
          clearKeysObj[cleanKid] = cleanKey;
        }
      });

      // Configurar Shaka con el set de llaves mapeadas
      player.configure({
        drm: {
          clearKeys: clearKeysObj
        }
      });

      // Cargar el manifiesto MPD
      player.load(canal.uri).then(() => {
        console.log(`Reproduciendo con éxito: ${canal.name}`);
        videoElement.play();
      }).catch(error => {
        console.error('Fallo al cargar el manifiesto de Shaka Player:', error);
        alert('Error al reproducir el canal. Verifica si las claves de cifrado siguen vigentes.');
        cerrarModalReproductor();
      });
    }

    // 5. CONTROLES DEL MODAL
    function abrirModalReproductor() {
      document.getElementById('modal-player').style.display = 'flex';
    }

    function cerrarModalReproductor() {
      document.getElementById('modal-player').style.display = 'none';
      if (videoElement) {
        videoElement.pause();
        player.unload(); // Detiene la descarga de segmentos en segundo plano
      }
    }
