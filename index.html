<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocramFlix+ Pro</title>
    <!-- Hls.js para reproducir streaming m3u8 localmente -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #121212;
            color: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #player-section {
            background: #000;
            width: 100%;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
        }
        .video-container {
            width: 100%;
            max-width: 1000px;
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 100%;
            display: block;
        }

        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 60%, rgba(0,0,0,0) 100%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 20px 15px 10px 15px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .video-container:hover .custom-controls,
        .video-container.paused .custom-controls {
            opacity: 1;
            pointer-events: auto;
        }
        
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }
        .controls-left, .controls-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, color 0.2s;
        }
        .control-btn:hover {
            color: #4CAF50;
            transform: scale(1.1);
        }
        
        .timeline-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .time-display {
            font-size: 0.85rem;
            font-family: monospace;
            color: #ccc;
        }
        input[type="range"] {
            -webkit-appearance: none;
            flex: 1;
            background: rgba(255,255,255,0.2);
            height: 4px;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            transition: height 0.1s;
        }
        input[type="range"]:hover {
            height: 6px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            background: #4CAF50;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }
        
        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .volume-container input[type="range"] {
            width: 70px;
        }

        .live-badge {
            background: #e74c3c;
            color: #fff;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            display: none;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .btn-cast {
            color: #3498db;
            font-weight: bold;
            border: 1px solid #3498db;
            border-radius: 4px;
            padding: 3px 8px;
            font-size: 0.8rem;
        }
        .btn-cast:hover { background: #3498db; color: #fff; }

        .navigation-tabs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px auto 10px auto;
            max-width: 1000px;
            width: 95%;
        }
        .tab-button {
            background: #1e1e1e;
            color: #aaa;
            border: 1px solid #2d2d2d;
            padding: 16px 10px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .tab-button.active {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        @media (max-width: 480px) {
            .navigation-tabs { gap: 8px; }
            .tab-button {
                font-size: 0.95rem;
                padding: 14px 6px;
            }
        }

        #content-section {
            padding: 0 15px 20px 15px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .panel {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #2d2d2d;
        }
        .panel h3 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 1rem;
            color: #4CAF50;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            background: #1e1e1e;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #2d2d2d;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
            min-width: 200px;
        }
        select {
            background: #2a2a2a;
            color: #fff;
            padding: 9px 12px;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .search-input-style {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            padding: 9px 12px;
            border-radius: 6px;
            font-size: 0.95rem;
        }

        .now-playing { font-weight: bold; color: #4CAF50; margin-bottom: 8px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; }

        #channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            width: 100%;
        }
        .channel-card {
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s, border-color 0.2s;
            width: 100%;
        }
        .channel-card:hover { background: #2a2a2a; border-color: #444; }
        
        .channel-card img {
            width: 65px;
            height: 90px;
            object-fit: cover;
            background: #2a2a2a;
            border-radius: 6px;
            padding: 1px;
        }
        
        .body-tv-mode .channel-card img,
        .body-premium-mode .channel-card img,
        .body-runtime-mode .channel-card img,
        .body-rakuten-mode .channel-card img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            background: #fff;
        }
        
        .channel-card span { 
            font-size: 0.85rem; 
            font-weight: 500; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
            overflow: hidden; 
        }

        .body-movie-mode #channel-grid {
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .body-movie-mode .channel-card { padding: 14px 10px; }
        .body-movie-mode .channel-card img {
            width: 100%;
            max-width: 180px;
            height: auto;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 5px 14px rgba(0, 0, 0, 0.7);
        }
        
        #player-error-box { display: none; background: #2980b9; color: #fff; padding: 15px; width: 100%; max-width: 1000px; box-sizing: border-box; font-size: 0.95rem; border-radius: 4px; margin-top: 5px; border-left: 5px solid #3498db; }
        #alt-actions { display: none; margin-top: 12px; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn-vlc { background: #e67e22; color: white; border: none; padding: 8px 15px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn-alt { background: #34495e; color: white; border: none; padding: 8px 15px; font-weight: bold; border-radius: 4px; cursor: pointer; }

        .movie-flex-container { display: flex; gap: 20px; margin-top: 5px; align-items: flex-start; }
        .movie-poster { width: 115px; min-width: 115px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.6); border: 1px solid #444; }
        .movie-text-details h4 { margin: 0 0 6px 0; color: #fff; font-size: 1.3rem; }
        .movie-text-details .movie-year { color: #4CAF50; font-size: 0.95rem; margin-bottom: 8px; font-weight: bold; }
        .movie-text-details p { margin: 0; font-size: 0.95rem; color: #d2d2d2; line-height: 1.5; }
    </style>
</head>
<body class="body-tv-mode" id="main-body">

    <!-- Sección del Video -->
    <div id="player-section">
        <div class="video-container paused" id="video-wrapper" onclick="handleVideoClick(event)">
            <video id="video" x-webkit-airplay="allow" preload="auto"></video>
            
            <div class="custom-controls" id="custom-controls-layer">
                <div class="timeline-container" id="timeline-wrapper">
                    <span class="time-display" id="time-current">00:00</span>
                    <input type="range" id="seek-bar" value="0" min="0" step="0.1" oninput="seekVideo()" onclick="event.stopPropagation()">
                    <span class="time-display" id="time-duration">00:00</span>
                </div>

                <div class="controls-row">
                    <div class="controls-left">
                        <button class="control-btn" id="play-pause-btn" onclick="togglePlay(event)">▶</button>
                        <div class="volume-container" onclick="event.stopPropagation()">
                            <button class="control-btn" id="mute-btn" onclick="toggleMute(event)">🔊</button>
                            <input type="range" id="volume-bar" value="1" min="0" max="1" step="0.05" oninput="changeVolume()">
                        </div>
                        <div class="live-badge" id="live-indicator">● EN DIRECTO</div>
                    </div>
                    <div class="controls-right">
                        <button class="control-btn btn-cast" id="cast-btn" onclick="sendToTV(event)">📺 Enviar TV</button>
                        <button class="control-btn" onclick="toggleFullscreen(event)">🔲</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mensajes Informativos -->
    <div style="display:flex; justify-content:center; padding: 0 15px;">
        <div id="player-error-box">
            <div id="error-text"></div>
            <div id="alt-actions">
                <button class="btn-vlc" id="vlc-btn">🧡 Abrir en VLC</button>
                <button class="btn-alt" id="copy-btn">📋 Copiar Enlace Stream</button>
            </div>
        </div>
    </div>

    <!-- Menú de Selección de Pestañas -->
    <div class="navigation-tabs">
        <button id="tab-tv" class="tab-button active" onclick="changeSection('tv')">📺 TV Directo</button>
        <button id="tab-premium" class="tab-button" onclick="changeSection('premium')">💎 Premium</button>
        <button id="tab-runtime" class="tab-button" onclick="changeSection('runtime')">🎬 Runtime TV</button>
        <button id="tab-rakuten" class="tab-button" onclick="changeSection('rakuten')">🌟 Rakuten TV</button>
        <button id="tab-movies" class="tab-button" onclick="changeSection('movies')">🍿 Pelis y Sagas</button>
    </div>

    <!-- Contenido Principal -->
    <div id="content-section">
        <div id="epg-container" class="panel">
            <div class="now-playing">🍿 Información en Pantalla</div>
            <div id="epg-info">Selecciona cualquier canal o película de abajo para comenzar.</div>
        </div>

        <div class="filter-bar">
            <div class="filter-item" id="category-filter-wrapper">
                <label for="category-select"><strong id="category-label-text">Filtrar por Categoría:</strong></label>
                <select id="category-select"><option value="">Esperando lista...</option></select>
            </div>
            <div class="filter-item" id="saga-select-wrapper" style="display: none;">
                <label for="saga-select"><strong>Seleccionar Colección / Saga:</strong></label>
                <select id="saga-select" onchange="loadLocalSaga()"></select>
            </div>
            <div class="filter-item">
                <label for="search-input"><strong>Buscador Instantáneo:</strong></label>
                <input type="text" id="search-input" class="search-input-style" placeholder="Escribe para buscar..." oninput="applyFilters()">
            </div>
        </div>

        <div id="channel-grid"></div>
    </div>

    <script>
        const REPO_SAGAS = [
            { name: "Colección Pixar", file: "Coleccion Pixar.m3u" },
            { name: "Colección DreamWorks Animation", file: "Coleccion DreamWorks Animation.m3u" },
            { name: "Universo DC", file: "Universo DC.m3u" },
            { name: "Universo Marvel", file: "Universo Marvel.m3u" },
            { name: "Sagas Policíacas", file: "Sagas Policiacas.m3u" },
            { name: "Sagas Acción", file: "Sagas Accion.m3u" },
            { name: "Colección Disney", file: "Coleccion Disney.m3u" },
            { name: "Nos va la marcha (Musicales)", file: "Nos va la marcha(Musicales).m3u" },
            { name: "Sagas Suspense", file: "Sagas Suspense.m3u" },
            { name: "Sagas Artes Marciales por Actor", file: "Sagas_Artes_Marciales_por_actor.m3u" },
            { name: "Sagas Comedia", file: "Sagas Comedia.m3u" },
            { name: "Colección Illumination", file: "Coleccion Illumination.m3u" },
            { name: "Colección Blue Sky", file: "Coleccion Blue Sky.m3u" }
        ];

        const TMDB_API_KEY = '8057a54a57714cade319b15e4fc0c3b4';

        const video = document.getElementById('video');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const seekBar = document.getElementById('seek-bar');
        const volumeBar = document.getElementById('volume-bar');
        const muteBtn = document.getElementById('mute-btn');
        const timeCurrent = document.getElementById('time-current');
        const timeDuration = document.getElementById('time-duration');
        const videoWrapper = document.getElementById('video-wrapper');
        const timelineWrapper = document.getElementById('timeline-wrapper');
        const liveIndicator = document.getElementById('live-indicator');

        const channelGrid = document.getElementById('channel-grid');
        const categorySelect = document.getElementById('category-select');
        const searchInput = document.getElementById('search-input');
        const epgInfoElement = document.getElementById('epg-info');
        const mainBody = document.getElementById('main-body');
        
        const errorBox = document.getElementById('player-error-box');
        const errorText = document.getElementById('error-text');
        const altActions = document.getElementById('alt-actions');
        const vlcBtn = document.getElementById('vlc-btn');
        const copyBtn = document.getElementById('copy-btn');

        const sagaSelectWrapper = document.getElementById('saga-select-wrapper');
        const sagaSelect = document.getElementById('saga-select');
        const categoryLabelText = document.getElementById('category-label-text');

        let currentSection = 'tv'; 
        let channels = [];
        let xmlEpgDoc = null;
        let hlsInstance = null;
        let currentMediaUrl = "";
        let originalItemPlaying = null;

        async function init() {
            buildSagaDropdown();
            await loadLocalEPG('listas/epg.xml');
            loadM3UFromUrl('listas/tv.m3u'); 
            setupPlayerErrorHandling();
            setupPlayerListeners();
        }

        async function changeSection(section) {
            currentSection = section;
            document.getElementById('tab-tv').classList.toggle('active', section === 'tv');
            document.getElementById('tab-premium').classList.toggle('active', section === 'premium');
            document.getElementById('tab-runtime').classList.toggle('active', section === 'runtime');
            document.getElementById('tab-rakuten').classList.toggle('active', section === 'rakuten');
            document.getElementById('tab-movies').classList.toggle('active', section === 'movies');
            
            searchInput.value = "";
            
            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
            video.pause(); video.src = ''; video.load();
            currentMediaUrl = "";
            originalItemPlaying = null;
            
            timelineWrapper.style.display = "none";
            liveIndicator.style.display = "none";
            errorBox.style.display = "none";
            
            channels = [];
            categorySelect.innerHTML = '<option value="">Cargando catálogo...</option>';
            channelGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#aaa;">Cambiando de sección...</div>';
            epgInfoElement.innerText = "Selecciona cualquier contenido de abajo para comenzar.";

            if (section === 'tv') {
                mainBody.className = "body-tv-mode";
                sagaSelectWrapper.style.display = "none";
                categoryLabelText.innerText = "Filtrar por Categoría:";
                await loadLocalEPG('listas/epg.xml');
                loadM3UFromUrl('listas/tv.m3u');
            } else if (section === 'premium') {
                mainBody.className = "body-premium-mode";
                sagaSelectWrapper.style.display = "none";
                categoryLabelText.innerText = "Filtrar por Categoría:";
                await loadLocalEPG('listas/epg-es.xml');
                loadM3UFromUrl('listas/star+.m3u');
            } else if (section === 'runtime') {
                mainBody.className = "body-runtime-mode";
                sagaSelectWrapper.style.display = "none";
                categoryLabelText.innerText = "Filtrar por Categoría:";
                await loadLocalEPG('listas/epg-es.xml');
                loadM3UFromUrl('listas/TV RuntimeTV.m3u');
            } else if (section === 'rakuten') {
                mainBody.className = "body-rakuten-mode";
                sagaSelectWrapper.style.display = "none";
                categoryLabelText.innerText = "Filtrar por Categoría:";
                await loadLocalEPG('listas/epg-es.xml');
                loadM3UFromUrl('listas/TV Rakuten TV.m3u');
            } else {
                mainBody.className = "body-movie-mode";
                sagaSelectWrapper.style.display = "flex";
                categoryLabelText.innerText = "Sub-Categoría Interna:";
                loadLocalSaga(); 
            }
        }

        function buildSagaDropdown() {
            sagaSelect.innerHTML = '';
            REPO_SAGAS.forEach(saga => {
                const opt = document.createElement('option');
                opt.value = `listas/${saga.file}`; 
                opt.innerText = saga.name;
                sagaSelect.appendChild(opt);
            });
        }

        async function loadLocalSaga() {
            const fileUrl = sagaSelect.value;
            channelGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#aaa;">Buscando lista en tu repositorio...</div>';
            try {
                const response = await fetch(encodeURI(fileUrl));
                if(!response.ok) throw new Error();
                const text = await response.text();
                processM3UText(text);
            } catch (e) {
                channelGrid.innerHTML = `<div style="grid-column:1/-1; color:#ff4d4d; padding:10px;">⚠️ Error: No se localizó la saga seleccionada.</div>`;
            }
        }

        async function loadM3UFromUrl(url) {
            if (!url) return;
            try {
                const response = await fetch(encodeURI(url));
                if (!response.ok) throw new Error();
                const text = await response.text();
                processM3UText(text);
            } catch (e) {
                channelGrid.innerHTML = `<div style="grid-column:1/-1; color:#ff4d4d; padding:10px;">⚠️ Error al cargar la lista: ${url}</div>`;
            }
        }

        async function loadLocalEPG(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error();
                let xmlText = await response.text();
                xmlText = xmlText.replace(/&((?![A-Za-z0-9#]+;)|$)/g, "&amp;");
                const parser = new DOMParser();
                xmlEpgDoc = parser.parseFromString(xmlText, "application/xml");
            } catch (e) {
                console.error("No se pudo leer la guía: " + url);
                xmlEpgDoc = null;
            }
        }

        function setupPlayerListeners() {
            video.addEventListener('timeupdate', () => {
                if (video.duration && isFinite(video.duration) && video.duration > 0) {
                    timelineWrapper.style.display = "flex";
                    liveIndicator.style.display = "none";
                    seekBar.max = video.duration;
                    seekBar.value = video.currentTime;
                    timeCurrent.innerText = formatTime(video.currentTime);
                    timeDuration.innerText = formatTime(video.duration);
                } else {
                    timelineWrapper.style.display = "none";
                    liveIndicator.style.display = "block";
                }
            });
            video.addEventListener('play', () => { playPauseBtn.innerText = "⏸"; videoWrapper.classList.remove('paused'); });
            video.addEventListener('pause', () => { playPauseBtn.innerText = "▶"; videoWrapper.classList.add('paused'); });
        }

        function handleVideoClick(event) {
            if (event.target === video || event.target === videoWrapper) { togglePlay(event); }
        }

        function togglePlay(e) {
            if(e) e.stopPropagation();
            if (video.paused) { video.play().catch(()=>{}); } else { video.pause(); }
        }

        function seekVideo() { if(isFinite(video.duration)) { video.currentTime = seekBar.value; } }

        function changeVolume() {
            video.volume = volumeBar.value;
            if (video.volume === 0) { muteBtn.innerText = "❌"; } 
            else if (video.volume < 0.5) { muteBtn.innerText = "🔉"; } 
            else { muteBtn.innerText = "🔊"; }
        }

        function toggleMute(e) {
            if(e) e.stopPropagation();
            if (video.muted) { video.muted = false; muteBtn.innerText = "🔊"; volumeBar.value = video.volume; } 
            else { video.muted = true; muteBtn.innerText = "❌"; volumeBar.value = 0; }
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return "00:00";
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            const pad = (num) => String(num).padStart(2, '0');
            return h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
        }

        function toggleFullscreen(e) {
            if(e) e.stopPropagation();
            if (!document.fullscreenElement) { videoWrapper.requestFullscreen().catch(err => {}); } else { document.exitFullscreen(); }
        }

        // GESTIÓN DE ENVÍO FILTRADA (PELÍCULAS VS CANALES CON RESTRICCIONES)
        function sendToTV(e) {
            if(e) e.stopPropagation();
            if (!currentMediaUrl) return alert("Primero selecciona un canal o película de la lista.");

            // Si es un canal en directo (.m3u8), alertamos de las restricciones CORS inevitables del hardware Chromecast
            const isHLSTV = currentMediaUrl.toLowerCase().includes('.m3u8') || currentMediaUrl.toLowerCase().includes('.ts') || currentMediaUrl.toLowerCase().includes('/live/');

            if (isHLSTV) {
                alert("📢 RETRANSMISIÓN DE CANALES IPTV:\n\nLos canales en directo tienen restricciones de seguridad (CORS/Tokens) impuestas por los servidores de la lista. Tu Smart TV rechaza la carga directa.\n\nPara verlo en tu TV ahora mismo sin cortes:\n\n1️⃣ Abre el menú de los 3 puntos de tu navegador Chrome (arriba a la derecha).\n2️⃣ Selecciona la opción 'Transmitir...' (o 'Cast').\n3️⃣ Elige tu televisión y se duplicará la pestaña con el vídeo fluyendo perfecto.\n\n💡 Alternativa: También puedes usar el botón naranja de VLC de abajo.");
                return;
            }

            // Si es película (archivo directo libre), ejecuta el disparador nativo de transmisión
            if (video.remote && video.remote.prompt) {
                video.remote.prompt().catch(() => {});
            } else if (video.webkitShowPlaybackTargetPicker) {
                video.webkitShowPlaybackTargetPicker();
            } else {
                alert("Para lanzar este contenido usa la función nativa 'Transmitir...' del menú superior de Chrome.");
            }
        }

        function setupPlayerErrorHandling() {
            video.onerror = function() {
                if (!video.src && currentMediaUrl === "") return;
                errorBox.style.backgroundColor = "#c0392b";
                errorBox.style.borderLeftColor = "#e74c3c";
                errorText.innerHTML = `<strong>Error de Reproducción:</strong> El navegador no ha podido cargar este stream de manera nativa (CORS, token IPTV caducado o códec incompatible).`;
                errorBox.style.display = "block";
                altActions.style.display = "flex";
            };
        }

        function processM3UText(text) {
            channels = parseM3U(text);
            buildCategoryMenu();
            applyFilters();
        }

        function parseM3U(m3uText) {
            const lines = m3uText.split('\n');
            const parsedChannels = [];
            let currentChannel = {};

            for (let line of lines) {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentChannel.logo = logoMatch ? logoMatch[1] : '';
                    const epgIdMatch = line.match(/tvg-id="([^"]+)"/);
                    currentChannel.epgId = epgIdMatch ? epgIdMatch[1] : '';
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    currentChannel.category = groupMatch ? groupMatch[1] : 'Otros / Canales';
                    const nameParts = line.split(',');
                    currentChannel.name = nameParts[nameParts.length - 1].trim();
                } else if (line.startsWith('http')) {
                    currentChannel.url = line;
                    parsedChannels.push(currentChannel);
                    currentChannel = {};
                }
            }
            return parsedChannels;
        }

        function buildCategoryMenu() {
            const categories = [...new Set(channels.map(c => c.category))].sort();
            categorySelect.innerHTML = '<option value="">Todos los géneros / categorías</option>';
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.innerText = cat;
                categorySelect.appendChild(option);
            });
            categorySelect.onchange = () => { applyFilters(); };
        }

        function applyFilters() {
            const selectedCategory = categorySelect.value;
            const searchWord = searchInput.value.toLowerCase().trim();

            const filtered = channels.filter(c => {
                const matchCategory = selectedCategory ? c.category === selectedCategory : true;
                const matchSearch = searchWord ? c.name.toLowerCase().includes(searchWord) : true;
                return matchCategory && matchSearch;
            });
            renderGrid(filtered);
        }

        function cleanMovieName(rawName) {
            const yearMatch = rawName.match(/\b(19\d{2}|20[0-2]\d)\b/);
            const detectedYear = yearMatch ? yearMatch[1] : null;
            let cleanQuery = rawName
                .replace(/\.(mp4|mkv|avi|webm|mov|ts)$/i, '')
                .replace(/[🍿🎬🎥📀▶►👇📢🌟✅🎭📺⭐🎞️🍿🔹🔸🔴]/g, '')
                .replace(/[\(\[\{].*?[\)\]\}]/g, ' ')
                .replace(/\b(1080p|720p|4k|2k|uhd|hd|sd|x264|h264|x265|h265|hevc|bluray|brrip|bdrip|dvdrip|hdrip|hdtv|webrip|webdl|web|rip|dual|audio|ac3|dts|aac|5\.1|vox|cine|esp|lat|castellano|spanish|sub|subs|subtitulado|multi|hdr|microhd|completa|pelicula|peli|full|torrent|descarga)\b/gi, '')
                .replace(/[-_.,|:+\/*_]/g, ' ')
                .replace(/\s+/g, ' ').trim();
            return { cleanQuery, detectedYear };
        }

        async function fetchGridIconFromTMDB(rawName, imgElementId) {
            const { cleanQuery, detectedYear } = cleanMovieName(rawName);
            let data = await fetchFromTMDB(cleanQuery, detectedYear || null);
            if (!data || !data.results || data.results.length === 0) { data = await fetchFromTMDB(cleanQuery, null); }
            
            if (data && data.results && data.results.length > 0) {
                const movie = data.results[0];
                if (movie.poster_path) {
                    const targetImg = document.getElementById(imgElementId);
                    if (targetImg) targetImg.src = `https://image.tmdb.org/t/p/w300${movie.poster_path}`;
                }
            }
        }

        function renderGrid(channelList) {
            channelGrid.innerHTML = '';
            if (channelList.length === 0) {
                channelGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#888; padding: 20px;">No hay contenidos disponibles en este filtro.</div>';
                return;
            }
            channelList.forEach((channel, index) => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                const uniqueImgId = `grid-icon-${index}`;
                
                card.innerHTML = `
                    <img id="${uniqueImgId}" src="${channel.logo || 'https://via.placeholder.com/140x200?text=SocramFlix'}" alt="${channel.name}" onerror="this.src='https://via.placeholder.com/140x200?text=Sin+Imagen'">
                    <span>${channel.name}</span>
                `;
                card.onclick = () => playMedia(channel);
                channelGrid.appendChild(card);

                if (currentSection === 'movies') { fetchGridIconFromTMDB(channel.name, uniqueImgId); }
            });
        }

        function playMedia(item) {
            errorBox.style.display = "none";
            altActions.style.display = "none";
            errorBox.style.backgroundColor = "#2980b9"; 
            errorBox.style.borderLeftColor = "#3498db";

            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
            video.src = ''; video.load();

            originalItemPlaying = item;
            let targetUrl = item.url;
            const urlLower = targetUrl.toLowerCase();
            
            const isAceStream = urlLower.includes('6878') || urlLower.includes('ace/getstream') || urlLower.includes('acestream') || urlLower.includes('ace/manifest.m3u8');

            if (isAceStream) {
                let aceId = "";
                const idMatch = targetUrl.match(/[?&]id=([^&]+)/);
                if (idMatch) { aceId = idMatch[1]; } else {
                    const rawHashMatch = targetUrl.match(/(?:acestream:\/\/|getstream\?id=|manifest\.m3u8\?id=)?([a-fA-F0-9]{40})/);
                    if (rawHashMatch) aceId = rawHashMatch[1];
                }

                if (aceId) {
                    targetUrl = `http://127.0.0.1:6878/ace/manifest.m3u8?id=${aceId}`;
                    epgInfoElement.innerHTML = `
                        <div style="color: #4CAF50; font-weight: bold; margin-bottom: 5px; font-size:1.05rem;">💎 Enlace AceStream Traducido a HLS Interno</div>
                        <div style="line-height:1.4;">Inyectando manifiesto HLS directo. Recuerda tener la app de <strong>Ace Stream Engine</strong> activa en segundo plano en este equipo.</div>
                    `;
                    errorText.innerHTML = `<strong>Canal Premium P2P Activo:</strong> Flujo levantado desde tu motor local. Si notas cortes, arrástralo directamente a tu VLC externo.`;
                    errorBox.style.display = "block"; altActions.style.display = "flex";
                }
            }

            currentMediaUrl = targetUrl;
            
            vlcBtn.onclick = () => { window.location.href = `vlc://${item.url}`; };
            copyBtn.onclick = () => { navigator.clipboard.writeText(item.url); alert("¡Enlace original copiado!"); };

            const isHLSTV = targetUrl.toLowerCase().includes('.m3u8') || targetUrl.toLowerCase().includes('.ts') || targetUrl.toLowerCase().includes('/live/');
            const isDirectVideo = currentSection === 'movies' || targetUrl.toLowerCase().includes('pixeldrain.net') || targetUrl.toLowerCase().includes('.mp4') || targetUrl.toLowerCase().includes('.mkv') || !isHLSTV;

            if (isDirectVideo) {
                timelineWrapper.style.display = "flex"; liveIndicator.style.display = "none";
                video.src = targetUrl; video.load(); video.play().catch(()=>{});
                searchMovieInTMDB(item.name);
            } else {
                timelineWrapper.style.display = "none"; liveIndicator.style.display = "block";
                if (Hls.isSupported()) {
                    hlsInstance = new Hls(); hlsInstance.loadSource(targetUrl); hlsInstance.attachMedia(video);
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() { video.play().catch(()=>{}); });
                    hlsInstance.on(Hls.Events.ERROR, function(event, data) { if (data.fatal) { video.src = targetUrl; video.play().catch(()=>{}); } });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = targetUrl;
                    video.addEventListener('loadedmetadata', function() { video.play().catch(()=>{}); });
                }
                if (!isAceStream) updateEPGDisplay(item);
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function fetchFromTMDB(query, year = null) {
            try {
                let url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&language=es-ES`;
                if (year) url += `&year=${year}`;
                const res = await fetch(url); return res.ok ? await res.json() : null;
            } catch (e) { return null; }
        }

        async function searchMovieInTMDB(rawName) {
            epgInfoElement.innerHTML = "Buscando carátula y detalles en TMDB...";
            const { cleanQuery, detectedYear } = cleanMovieName(rawName);
            let data = await fetchFromTMDB(cleanQuery, detectedYear || null);
            if (!data || !data.results || data.results.length === 0) { data = await fetchFromTMDB(cleanQuery, null); }

            if (data && data.results && data.results.length > 0) {
                const movie = data.results[0];
                const posterUrl = movie.poster_path ? `https://image.tmdb.org/t/p/w200${movie.poster_path}` : 'https://via.placeholder.com/115x170?text=Sin+Imagen';
                const year = movie.release_date ? movie.release_date.split('-')[0] : 'Desconocido';

                epgInfoElement.innerHTML = `
                    <div class="movie-flex-container">
                        <img class="movie-poster" src="${posterUrl}" alt="${movie.title}">
                        <div class="movie-text-details">
                            <h4>${movie.title}</h4>
                            <div class="movie-year">📅 Año: ${year} | 📊 Nota: ${movie.vote_average || 'N/C'}</div>
                            <p>${movie.overview || 'Sin descripción disponible.'}</p>
                        </div>
                    </div>
                `;
            } else { epgInfoElement.innerHTML = `<div><strong>Archivo:</strong> ${rawName}</div>`; }
        }

        function updateEPGDisplay(channel) {
            if (!xmlEpgDoc) { epgInfoElement.innerText = "Guía de programación (EPG) no disponible actualmente."; return; }
            const channelId = channel.epgId || channel.name;
            const now = new Date();
            let currentProgramTitle = "Programación en directo no disponible para este canal actualmente.";

            const programmes = xmlEpgDoc.querySelectorAll(`programme[channel="${channelId}"]`);
            if (programmes.length > 0) {
                for (let prog of programmes) {
                    const startAttr = prog.getAttribute('start');
                    const stopAttr = prog.getAttribute('stop');
                    if (startAttr && stopAttr) {
                        const startTime = parseEPGDate(startAttr);
                        const stopTime = parseEPGDate(stopAttr);
                        if (now >= startTime && now <= stopTime) {
                            const titleNode = prog.querySelector('title');
                            const descNode = prog.querySelector('desc');
                            currentProgramTitle = titleNode ? titleNode.textContent : "Sin título";
                            if (descNode) currentProgramTitle += ` — ${descNode.textContent}`;
                            const timeString = ` [${formatEPGTimeLabel(startTime)} - ${formatEPGTimeLabel(stopTime)}]`;
                            epgInfoElement.innerText = currentProgramTitle + timeString;
                            return;
                        }
                    }
                }
            }
            epgInfoElement.innerText = currentProgramTitle;
        }

        function parseEPGDate(dateStr) {
            const cleanStr = dateStr.trim();
            const year = parseInt(cleanStr.substr(0, 4), 10);
            const month = parseInt(cleanStr.substr(4, 2), 10) - 1;
            const day = parseInt(cleanStr.substr(6, 2), 10);
            const hour = parseInt(cleanStr.substr(8, 2), 10);
            const minute = parseInt(cleanStr.substr(10, 2), 10);
            const second = parseInt(cleanStr.substr(12, 2), 10);
            const utcDate = new Date(Date.UTC(year, month, day, hour, minute, second));
            if (cleanStr.length > 14) {
                const tzSign = cleanStr.includes('-') ? -1 : 1;
                const tzMatch = cleanStr.match(/[\+\-](\d{2})(\d{2})/);
                if (tzMatch) {
                    const tzHours = parseInt(tzMatch[1], 10); const tzMinutes = parseInt(tzMatch[2], 10);
                    const totalOffsetMinutes = (tzHours * 60 + tzMinutes) * tzSign;
                    utcDate.setMinutes(utcDate.getMinutes() - totalOffsetMinutes);
                }
            }
            return utcDate;
        }

        function formatEPGTimeLabel(dateObj) {
            return `${String(dateObj.getHours()).padStart(2, '0')}:${String(dateObj.getMinutes()).padStart(2, '0')}`;
        }

        window.onload = init;
    </script>
