<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocramFlix+ - TV y Guía</title>
    <!-- Librería HLS.js para reproducir m3u8 en navegadores -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent: #e50914; /* Rojo estilo Flix */
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: var(--panel-bg);
            padding: 15px 20px;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 2px solid var(--accent);
            text-align: center;
        }

        header span {
            color: var(--accent);
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .player-section {
            flex: 3;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .video-container {
            width: 100%;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        video {
            width: 100%;
            aspect-ratio: 16/9;
            display: block;
        }

        .epg-panel {
            margin-top: 20px;
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
        }

        .epg-panel h2 {
            margin: 0 0 10px 0;
            font-size: 22px;
        }

        .epg-panel p {
            margin: 0;
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1.5;
        }

        .horario {
            font-weight: bold;
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 10px;
        }

        .playlist-section {
            flex: 1;
            background-color: var(--panel-bg);
            border-left: 1px solid #333;
            overflow-y: auto;
            padding: 10px;
        }

        .channel-btn {
            display: flex;
            align-items: center;
            background-color: #2a2a2a;
            border: none;
            color: white;
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            text-align: left;
            font-size: 16px;
        }

        .channel-btn:hover {
            background-color: #3a3a3a;
        }

        .channel-btn.active {
            background-color: var(--accent);
        }

        .loader {
            color: var(--accent);
            font-weight: bold;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

    <header>Socram<span>Flix+</span></header>

    <div class="container">
        <!-- Sección del Reproductor y EPG -->
        <div class="player-section">
            <div class="video-container">
                <video id="videoPlayer" controls></video>
            </div>
            
            <div class="epg-panel">
                <h2 id="epg-title">Selecciona un canal</h2>
                <p id="epg-desc">Cargando guía de programación...</p>
            </div>
        </div>

        <!-- Lista de Canales -->
        <div class="playlist-section" id="playlist">
            <div class="loader" id="loading-msg">Cargando EPG...</div>
            <!-- Los botones se generarán con JS -->
        </div>
    </div>

    <script>
        // Variables globales
        let epgData = [];
        let hls;

        // EJEMPLO: Tu lista de canales con sus IDs exactos de TDTChannels (.es)
        const canales = [
            { id: "La1.es", nombre: "La 1", url: "https://rtve-live-la1.zapi.tech/la1/la1.m3u8" },
            { id: "La2.es", nombre: "La 2", url: "https://rtve-live-la2.zapi.tech/la2/la2.m3u8" },
            { id: "Antena3.es", nombre: "Antena 3", url: "https://livetv.atresmedia.com/antena3/master.m3u8" },
            { id: "Cuatro.es", nombre: "Cuatro", url: "https://mdslive.shls.eu/live/cuatro/cuatro.m3u8" },
            { id: "Telecinco.es", nombre: "Telecinco", url: "https://mdslive.shls.eu/live/telecinco/telecinco.m3u8" },
            { id: "LaSexta.es", nombre: "La Sexta", url: "https://livetv.atresmedia.com/lasexta/master.m3u8" }
        ];

        // 1. Cargar la EPG al iniciar la página
        async function cargarEPG() {
            try {
                // Usamos el proxy para saltarnos el bloqueo CORS del navegador
                const urlJSON = 'https://www.tdtchannels.com/epg/TV.json';
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(urlJSON)}`;
                
                const respuesta = await fetch(proxyUrl);
                const datosProxy = await respuesta.json();
                epgData = JSON.parse(datosProxy.contents);
                
                document.getElementById('loading-msg').style.display = 'none';
                generarListaCanales();
                
            } catch (error) {
                console.error("Error al cargar EPG:", error);
                document.getElementById('loading-msg').innerText = "Error cargando la EPG. Mostrando canales sin guía.";
                generarListaCanales();
            }
        }

        // 2. Generar los botones del menú lateral
        function generarListaCanales() {
            const playlist = document.getElementById('playlist');
            
            canales.forEach(canal => {
                const btn = document.createElement('button');
                btn.className = 'channel-btn';
                btn.innerText = canal.nombre;
                btn.onclick = () => reproducirCanal(canal, btn);
                playlist.appendChild(btn);
            });
        }

        // 3. Reproducir el canal y actualizar la caja de la EPG
        function reproducirCanal(canal, botonElement) {
            // Estilos de botón activo
            document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
            if(botonElement) botonElement.classList.add('active');

            // Lógica del reproductor HLS
            const video = document.getElementById('videoPlayer');
            
            if (Hls.isSupported()) {
                if (hls) {
                    hls.destroy(); // Limpiar canal anterior
                }
                hls = new Hls();
                hls.loadSource(canal.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Para Safari
                video.src = canal.url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }

            // Actualizar la EPG en pantalla
            mostrarInfoEPG(canal);
        }

        // 4. Buscar el programa actual en el JSON y mostrarlo
        function mostrarInfoEPG(canal) {
            const tituloEl = document.getElementById('epg-title');
            const descEl = document.getElementById('epg-desc');

            if (epgData.length === 0) {
                tituloEl.innerText = canal.nombre;
                descEl.innerText = "Guía no disponible temporalmente.";
                return;
            }

            // Buscar el canal en la base de datos de TDTChannels
            const canalEPG = epgData.find(c => c.id === canal.id);

            if (canalEPG && canalEPG.epg) {
                const ahora = new Date();
                
                // Buscar qué programa coincide con la hora exacta
                const programaActual = canalEPG.epg.find(prog => {
                    const inicio = new Date(prog.start);
                    const fin = new Date(prog.stop);
                    return ahora >= inicio && ahora <= fin;
                });

                if (programaActual) {
                    // Formatear la hora (ej: "15:30")
                    const horaInicio = new Date(programaActual.start).toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'});
                    const horaFin = new Date(programaActual.stop).toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'});

                    tituloEl.innerHTML = `<span class="horario">${horaInicio} - ${horaFin}</span> ${programaActual.title}`;
                    descEl.innerText = programaActual.description || "Sin descripción disponible para este programa.";
                } else {
                    tituloEl.innerText = canal.nombre;
                    descEl.innerText = "No hay datos de emisión para esta hora.";
                }
            } else {
                tituloEl.innerText = canal.nombre;
                descEl.innerText = "Guía no enlazada para este canal.";
            }
        }

        // Iniciar la app cargando la guía
        cargarEPG();

        // Refrescar la EPG cada 1 minuto por si cambia de programa mientras lo ves
        setInterval(() => {
            const botonActivo = document.querySelector('.channel-btn.active');
            if(botonActivo) {
                // Buscamos cuál es el canal activo mirando el texto del botón (forma rápida)
                const canalActivo = canales.find(c => c.nombre === botonActivo.innerText);
                if(canalActivo) mostrarInfoEPG(canalActivo);
            }
        }, 60000); 
    </script>
</body>
</html>
